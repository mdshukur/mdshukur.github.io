<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <style>
      .navbar-toggler {
        width: 20px;
        height: 20px;
        position: relative;
        transition: .5s ease-in-out;
      }

      .navbar-toggler,
      .navbar-toggler:focus,
      .navbar-toggler:active,
      .navbar-toggler-icon:focus {
        outline: none;
        box-shadow: none;
        border: 0;
        position: relative;
      }

      .navbar-toggler span {
        margin: 0;
        padding: 0;
      }

      .toggler-icon {
        display: block;
        position: absolute;
        height: 3px;
        width: 100%;
        background: #d3531a;
        border-radius: 1px;
        opacity: 1;
        left: 0;
        transform: rotate(0deg);
        transition: .25s ease-in-out;
      }

      .middle-bar {
        margin-top: 0px;
      }

      /* State when the navbar is collapsed */
      .navbar-toggler.collapsed .top-bar {
        position: absolute;
        top: 0px;
        transform: rotate(0deg);
      }

      .navbar-toggler.collapsed .middle-bar {
        opacity: 1;
        position: absolute;
        top: 10px;
        filter: alpha(opacity=100);
      }

      .navbar-toggler.collapsed .bottom-bar {
        position: absolute;
        top: 20px;
        transform: rotate(0deg);
      }

      /* When navigation is clicked */
      .navbar-toggler .top-bar {
        top: inherit;
        transform: rotate(135deg);
      }

      .navbar-toggler .middle-bar {
        opacity: 0;
        top: inherit;
        filter: alpha(opacity=0);
      }

      .navbar-toggler .bottom-bar {
        top: inherit;
        transform: rotate(-135deg);
      }

      /* Color of 3 lines */
      .navbar-toggler.collapsed .toggler-icon {
        background: linear-gradient(263deg, rgba(252,74,74,1) 0%, rgba(0,212,255,1) 100%);
      }

      .navbar-light .navbar-nav .nav-link:focus,
      .navbar-light .navbar-nav .nav-link:hover {
        color: rgb(255 0 0);
      }

      .navbar-light .navbar-nav .nav-link.active {
        color: rgb(255, 0, 0); /* Red color for active state */
      }
    </style>

    <title>Hello, world!</title>
  </head>
  <body>
    <div class="Navbarr navbar-light bg-light sticky-top">
      <div class="container">
        <nav class="navbar navbar-expand-lg">
          <a class="navbar-brand" href="#">Navbar</a>
          <button class="navbar-toggler collapsed d-flex d-lg-none flex-column justify-content-around" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="toggler-icon top-bar"></span>
            <span class="toggler-icon middle-bar"></span>
            <span class="toggler-icon bottom-bar"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item" id="home">
                <a class="nav-link" aria-current="page" href="index.html">Home</a>
              </li>
              <li class="nav-item" id="research">
                <a class="nav-link" href="research.html">Research</a>
              </li>
              <li class="nav-item" id="science-communication">
                <a class="nav-link" href="science-communication.html">Science Communication</a>
              </li>
              <li class="nav-item" id="press-coverage">
                <a class="nav-link" href="press-coverage.html">Press Coverage</a>
              </li>
              <li class="nav-item" id="opportunities">
                <a class="nav-link" href="opportunities.html">Opportunities</a>
              </li>
              <li class="nav-item" id="contact">
                <a class="nav-link" href="contact.html">Contact</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        // Get the current URL path
        const currentPath = window.location.pathname.split('/').pop() || 'index.html';

        // Get all the nav items
        const navItems = document.querySelectorAll('.nav-item');

        // Loop through each nav item
        navItems.forEach(item => {
          // Get the href attribute of the anchor tag inside the nav item
          const link = item.querySelector('a').getAttribute('href').split('/').pop();

          // Check if the link matches the current path
          if (link === currentPath) {
            // Add the 'active' class to the nav item
            item.querySelector('a').classList.add('active');
          }
        });
      });
    </script>
  </body>
</html>
